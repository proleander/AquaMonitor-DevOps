name: CI/CD AquaMonitor

on:
  push:
    branches: [ "main" ] 
jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run Tests (xUnit)
      run: dotnet test --no-restore --verbosity normal

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker Image
      run: docker build -t aquamonitor-api:staging .
    - name: Push to Staging Registry
      run: echo "Simulando push da imagem para ambiente de STAGING..."

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker Image
      run: docker build -t aquamonitor-api:prod .
    - name: Final Deploy
      run: echo "Simulando deploy para ambiente de PRODUÇÃO (Oracle FIAP Cloud)..."